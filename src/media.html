<!doctype html>
<html lang="en"> 
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WebTools - Information your browser can provide</title>

        <link rel="stylesheet" type="text/css" href="common.css">
    </head>

    <body>
        <h1>Media</h1>

        <div class="listofcontainers">
            <div class="container">
                <!--- Globally supported constraints by mediaDevices-->
                <h4>Globally supported Constraints:</h4>
                <div id="supportedConstraints" class="box">     
                </div>
            </div>
            <div class="container">
                <h4>Available devices</h4>
                <div id="listOfDevices" class="box">
                </div>
            </div>

            <div class="container">
                <h4>User provided video constraints to select media stream (tap to edit)</h4>
                <textarea id="setVideoConstraints" >
                </textarea>
                <button  onclick="init_camera()">Apply constraints and refresh</button>
            </div>
        </div>

        <h3 id="cameraError" style="color:red;display: none;">Camera cannot be found or accessed</h3>
        <video id="videoPlayer" class="center" width="1280" height="720" 
                autoplay="true" controls="true" muted="true"></video>

        
        <div class="listofcontainers">
            <div class="container">
                <h3>Available MediaTrack Information</h3>
                <hr>
                <div id="availableCapabilities">
                </div>
                <hr>
            </div>
        </div>
        


        <script>
            const videoPlayer = document.getElementById('videoPlayer');
            const supportedConstraints = document.getElementById('supportedConstraints');
            const setVideoConstraints = document.getElementById('setVideoConstraints');
            const cameraErrorMessage = document.getElementById('cameraError');
            const listOfDevices = document.getElementById("listOfDevices");


            supportedConstraints.innerHTML = '<pre>' + JSON.stringify(navigator.mediaDevices.getSupportedConstraints(), null, 2) + '</pre>';

            setVideoConstraints.value = JSON.stringify({
                            audio: {},
                            video: {
                                width: { ideal: 1280 },
                                height: { min: 360, ideal: 720, max: 1080 }
                            }
                        }, null, 2);
            
            function enumerate_devices() {
                enumerateDevicesString = "<ol>"
                if (!navigator.mediaDevices?.enumerateDevices) {
                    listOfDevices.innerHTML = "Error, enumerateDevices() is not supported by this browser"
                } else {
                    // List cameras and microphones.
                    navigator.mediaDevices
                        .enumerateDevices()
                        .then((devices) => {
                            devices.forEach((device) => {                      
                                enumerateDevicesString += "<li><strong><u>" + device.label + "</u></strong></li>"
                                enumerateDevicesString += "<ul><li><strong>Kind:</strong> " + device.kind + 
                                                        '</li><li><strong>ID:</strong> "' + device.deviceId + '"</li></ul>'
                                
                                if (device.getCapabilities) {
                                  capabilitiesString += "<li> <strong>Device Capabilities: </strong> </li>"
                                  capabilitiesString += "<div class='box'><pre>" + JSON.stringify( device.getCapabilities(), null, 2) + "</pre></div>"
                            
                                }
                            });
                            enumerateDevicesString += "</ol>"
                            listOfDevices.innerHTML = enumerateDevicesString    
                        })
                        .catch((err) => {
                            enumerateDevicesString += "<li>" + '${err.name}: ${err.message}' + "</li>"
                        });

                        id = -1;
                        // Get video track ID
                        window.videoStream.getTracks().forEach( track => {
                            if (track.kind === "video"){
                                id = track.id
                            }
                        })
                        // Default contraints json
                        setVideoConstraints.value = JSON.stringify({
                            audio: {},
                            video: {
                                deviceId: { exact: id },
                                width: { ideal: 1280 },
                                height: { min: 360, ideal: 720, max: 1080 }
                            }
                        }, null, 2);
                        
                }
            }

            function init_camera() {
                const constraints = JSON.parse(document.getElementById('setVideoConstraints').value);

                navigator.mediaDevices.getUserMedia(constraints)
                    .then( (stream) => {
                        videoPlayer.srcObject = stream;
                        // Make stream global
                        window.videoStream = stream;
                        
                        // Display available capabilities and constraints for this stream
                        
                        capabilitiesString = "<div class='listofcontainers'>"
                        stream.getTracks().forEach(track => {
                            capabilitiesString += "<div class='container'>"
                            capabilitiesString += "<h4> Label: '" + track.label + "' </h4>\n"
                            capabilitiesString += "<ul>"
                            capabilitiesString += "<li> <strong>Track ID: </strong> <span>" + track.id + "</span></li>"
                            capabilitiesString += "<li> <strong>Track Kind: </strong> <span>" + track.kind + "</span></li>"
                            capabilitiesString += "<li> <strong>Content hint: </strong> <span>" + track.contentHint + "</span></li>"
                            capabilitiesString += "<li> <strong>Enabled: </strong> <span>" + track.enabled + "</span></li>"
                            
                            capabilitiesString += "<li> <strong>Track Capabilities: </strong> </li>"
                            capabilitiesString += "<div class='box'><pre>" + JSON.stringify( track.getCapabilities(), null, 2) + "</pre></div>"
                            
                            capabilitiesString += "<li> <strong>Track Settings: </strong> </li>"
                            capabilitiesString += "<div class='box'><pre>" + JSON.stringify( track.getSettings(), null, 2) + "</pre></div>"
                            
                            capabilitiesString += "<li> <strong>Track Constraints: </strong> </li>"
                            capabilitiesString += "<div class='box'><pre>" + JSON.stringify( track.getConstraints(), null, 2) + "</pre></div>"

                            capabilitiesString += "</ul>"
                            capabilitiesString += "</div>"
                            
                        });
                        capabilitiesString += "</div>"
                        document.getElementById("availableCapabilities").innerHTML = capabilitiesString

                        enumerate_devices()
                        
                        cameraErrorMessage.style="display: none;"
                    }).catch(function(error) {
                        cameraErrorMessage.style="color:red;"
                        console.error('Error accessing camera:', error);
                    });
            }

            init_camera();

        </script>
    </body>
</html>
